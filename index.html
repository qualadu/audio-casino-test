  <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zufallsautomat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bulb-row" id="bulbRow" aria-hidden="true"></div>

  <main class="stage">
    <h1 class="marquee">SOUND GAMBLING</h1>
    <p class="subtitle">Was sind das wohl für sounds?</p>

    <div class="bottom-panel">
      <div class="cabinet">
        <div class="cabinet-plate">
          <div class="reel-window" id="reelWindow" aria-live="polite">
            <div class="reel" id="reel1"><span>&#9889;</span></div>
            <div class="reel" id="reel2"><span>&#129544;</span></div>
            <div class="reel" id="reel3"><span>&#10052;&#65039;</span></div>
          </div>
          <p class="readout" id="readout">Bereit</p>
        </div>

        <button class="lever-assembly" id="leverBtn" type="button" aria-label="Hebel ziehen, um einen zuf&auml;lligen Sound abzuspielen">
          <span class="lever-base"></span>
          <span class="lever-arm" id="leverArm">
            <span class="lever-rod"></span>
            <span class="lever-knob"></span>
          </span>
        </button>
      </div>

      <p class="hint">Probiers doch 6 - 7 mol us ⁶🤷‍♂️⁷</br> test</p>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
  <script src="js/script.js"></script>
</body>
</html>
