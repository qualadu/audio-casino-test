  <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Casino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="top-bar">
  <div class="balance" id="balance">100 💰</div>
  
  <div class="info-dropdown">
    <button class="dropdown-btn">📋 Sound-Preise</button>
    <div class="dropdown-content" id="soundList"></div>
  </div>
  </header>

  <div class="bulb-row" id="bulbRow" aria-hidden="true"></div>

  <main class="stage">
    <h1 class="marquee">SOUND GAMBLING</h1>
    <p class="subtitle">Was sind das wohl für sounds?</p>

    <div class="bottom-panel">
      <div class="cabinet">
        <div class="cabinet-plate">
          <div class="reel-window" id="reelWindow" aria-live="polite">
            <div class="reel" id="reel1"><div class="reel-strip"><span>&#9889;</span></div></div>
            <div class="reel" id="reel2"><div class="reel-strip"><span>&#129544;</span></div></div>
            <div class="reel" id="reel3"><div class="reel-strip"><span>&#10052;&#65039;</span></div></div>
          </div>
          <p class="readout" id="readout">Bereit</p>
        </div>

        <button class="lever-assembly" id="leverBtn" type="button" aria-label="Hebel ziehen, um einen zuf&auml;lligen Sound abzuspielen">
          <span class="lever-base"></span>
          <span class="lever-arm" id="leverArm">
            <span class="lever-rod"></span>
            <span class="lever-knob"></span>
          </span>
        </button>
      </div>

      <p class="hint">Test Version 2.3</p>
    </div>
  </main>

  <script src="js/script.js"></script>

<script>
  // Dropdown mit Sound-Preisen füllen + Sortierung (höchster Gewinn zuerst)
  function buildSoundList() {
    const container = document.getElementById("soundList");
    container.innerHTML = "<h3>Sound → Coins</h3>";
   
    // Kopie der Library und nach Coins absteigend sortieren
    const sortedSounds = [...SOUND_LIBRARY].sort((a, b) => b.coins - a.coins);

    sortedSounds.forEach(s => {
      const div = document.createElement("div");
      div.className = "sound-entry";
      div.innerHTML = `${s.symbol} ${s.label} <span class="coin-value">+${s.coins} 💰</span>`;
      container.appendChild(div);
    });
  }

  // Toggle-Funktion für Dropdown (öffnen/schließen)
  function toggleDropdown() {
    const dropdown = document.querySelector('.info-dropdown');
    dropdown.classList.toggle('active');
  }

  window.addEventListener("DOMContentLoaded", () => {
    initReels();
    updateBalanceDisplay();
    buildSoundList();

    // Button zum Toggle machen
    const dropdownBtn = document.querySelector('.dropdown-btn');
    dropdownBtn.addEventListener('click', toggleDropdown);
  });
</script>
</body>
</html>
